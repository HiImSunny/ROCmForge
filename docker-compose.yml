# Notes for the instance operator:
# 1. On first real run: docker compose build --no-cache
# 2. Watch amd-smi in another terminal while a job runs.
# 3. Use /admin/cleanup?max_age_hours=12 to keep disk reasonable.
# 4. Point any external frontend at http://<instance-ip>:8000
# 5. For JUDGING.md 90s verification use the /demo/seed and /health endpoints.
